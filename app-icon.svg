<?xml version="1.0" standalone="no"?>
<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- 背面のウィンドウ影 -->
                    <rect x="44" y="24" width="184" height="216" rx="16" fill="#cbd5e1">
  </rect>
                    
                    <!-- ウィンドウ本体（白基調） -->
                    <rect x="40" y="20" width="184" height="216" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="2">
  </rect>

                    <!-- ヘッダー部分（Mac風コントロール） -->
                    <circle cx="58" cy="36" r="4" fill="#fca5a5">
  </circle>
                    <circle cx="72" cy="36" r="4" fill="#fde047">
  </circle>
                    <circle cx="86" cy="36" r="4" fill="#86efac">
  </circle>
                    
                    <line x1="40" y1="52" x2="224" y2="52" stroke="#e2e8f0" stroke-width="2">
  </line>

                    <!-- ペイン分割（タイル状） -->
                    
                    <!-- 左ペイン（青枠を削除し、クリーンなグレー枠に統一） -->
                    <rect x="46" y="54" width="84" height="176" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1">
  </rect>

                    <!-- 右上ペイン -->
                    <rect x="136" y="54" width="82" height="84" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1">
  </rect>

                    <!-- 右下ペイン -->
                    <rect x="136" y="144" width="82" height="86" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1">
  </rect>

                    <!-- 各ペインのテキストライン -->
                    <!-- 左ペイン -->
                    <rect x="52" y="64" width="18" height="3" rx="1.5" fill="#3b82f6">
  </rect>
                    <rect x="74" y="64" width="12" height="3" rx="1.5" fill="#cbd5e1">
  </rect>
                    <rect x="90" y="64" width="24" height="3" rx="1.5" fill="#64748b">
  </rect>

                    <rect x="52" y="72" width="18" height="3" rx="1.5" fill="#3b82f6">
  </rect>
                    <rect x="74" y="72" width="12" height="3" rx="1.5" fill="#cbd5e1">
  </rect>
                    <rect x="90" y="72" width="30" height="3" rx="1.5" fill="#64748b">
