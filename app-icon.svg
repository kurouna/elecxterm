                    <rect x="162" y="162" width="12" height="3" rx="1.5" fill="#cbd5e1">
  </rect>
                    <rect x="178" y="162" width="22" height="3" rx="1.5" fill="#64748b">
  </rect>

                    <rect x="142" y="170" width="16" height="3" rx="1.5" fill="#3b82f6">
  </rect>
                    <rect x="162" y="170" width="12" height="3" rx="1.5" fill="#cbd5e1">
  </rect>
                    <rect x="178" y="170" width="26" height="3" rx="1.5" fill="#64748b">
