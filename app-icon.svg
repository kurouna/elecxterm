                    <rect x="178" y="113" width="6" height="8" fill="none" stroke="#94a3b8" stroke-width="1.5">
  </rect> <!-- 非アクティブなカーソルはグレーに -->

                    <!-- 右下ペイン -->
                    <rect x="142" y="154" width="16" height="3" rx="1.5" fill="#3b82f6">
  </rect>
                    <rect x="162" y="154" width="12" height="3" rx="1.5" fill="#cbd5e1">
  </rect>
                    <rect x="178" y="154" width="30" height="3" rx="1.5" fill="#64748b">
  </rect>

                    <rect x="142" y="162" width="16" height="3" rx="1.5" fill="#3b82f6">
