name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Generate app icons
        run: npx tauri icon ./app-icon.svg

      - name: Build Tauri app
        run: npm run tauri build

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || startsWith(github.ref_name, 'v0.0.') }}
          files: |
            src-tauri/target/release/bundle/msi/**/*.msi
            src-tauri/target/release/bundle/nsis/**/*.exe
          body: |
            ## インストール方法

            ### Windows
            - **`.msi`** : Windows インストーラー（推奨）
            - **`.exe`** : NSIS インストーラー

            > ⚠️ Windows SmartScreen の警告が出た場合は「詳細情報」→「実行」で進んでください。
            > これはコードサイニング証明書が未設定のアルファ版のためです。
